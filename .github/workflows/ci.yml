name: CI Ristorante

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Esegui i test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test   # <-- la build parte SOLO se i test passano
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pubblica artefatto
        uses: actions/upload-artifact@v7
        with:
          name: ristorante-backend
          path: |
            src/
            package.json
